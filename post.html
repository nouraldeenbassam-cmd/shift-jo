<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>انشر إعلان — شفت / Shift</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#FAFAF8; --card:#FFFFFF; --border:#E5E3DC; --border-strong:#D3D1C7;
    --text:#2C2C2A; --text-dim:#726F66; --blue:#378ADD; --blue-dark:#0C447C;
    --green:#639922; --green-dark:#27500A; --coral:#D85A30;
    --sans:'Tajawal', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); }
  .wrap{ max-width:560px; margin:0 auto; padding:0 22px 90px; }

  header{ padding:30px 0 22px; }
  .brand{ display:flex; align-items:center; gap:8px; }
  .brand .mark{ width:28px; height:28px; border-radius:8px; background:var(--blue); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px; }
  .brand .name{ font-weight:900; font-size:17px; letter-spacing:-0.01em; }
  .brand .name span{ color:var(--blue); }
  .back-link{ display:inline-block; margin-top:14px; font-size:12.5px; color:var(--text-dim); text-decoration:none; }
  .back-link:hover{ text-decoration:underline; }

  .panel{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-top:10px; }
  .panel h2{ font-size:17px; font-weight:700; margin-bottom:4px; }
  .panel .hint{ color:var(--text-dim); font-size:12.5px; margin-bottom:18px; }

  .field{ margin-bottom:13px; }
  .field label{ display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:5px; font-weight:500; }
  .field input, .field select, .field textarea{
    width:100%; background:var(--bg); border:1px solid var(--border-strong); color:var(--text);
    padding:9px 11px; border-radius:8px; font-family:var(--sans); font-size:14px;
  }
  .field textarea{ resize:vertical; min-height:60px; }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(55,138,221,0.12); }
  .field .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .checks{ display:flex; gap:16px; margin-bottom:14px; }
  .checks label{ display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-dim); flex-direction:row-reverse; }
  .checks input{ width:auto; }

  .btn{
    width:100%; background:var(--blue); color:#fff; border:none; padding:12px;
    font-weight:700; font-size:14.5px; border-radius:8px; cursor:pointer; margin-top:4px;
  }
  .btn:hover{ background:var(--blue-dark); }
  .form-msg{ font-size:12px; margin-top:10px; display:none; font-weight:500; line-height:1.6; }
  .form-msg.ok{ color:var(--green-dark); }
  .form-msg.err{ color:var(--coral); }

  .tabs{ display:flex; gap:6px; margin-bottom:16px; background:var(--bg); border-radius:8px; padding:4px; }
  .tab{ flex:1; text-align:center; padding:8px; font-size:13px; font-weight:600; color:var(--text-dim); border-radius:6px; cursor:pointer; }
  .tab.active{ background:var(--card); color:var(--text); box-shadow:0 1px 2px rgba(0,0,0,0.06); }

  .topbar{ position:sticky; top:0; z-index:50; background:var(--card); border-bottom:1px solid var(--border); }
  .topbar-inner{ max-width:560px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; justify-content:space-between; }
  .topbar .brand{ display:flex; align-items:center; gap:8px; text-decoration:none; }
  .topbar-icons{ display:flex; align-items:center; gap:8px; }
  .icon-btn{ position:relative; background:none; border:1px solid var(--border-strong); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .bell-count{ display:none; position:absolute; top:-6px; left:-6px; background:var(--coral); color:#fff; font-size:10px; font-weight:700; border-radius:50%; width:16px; height:16px; align-items:center; justify-content:center; }
  .gear-wrap{ position:relative; }
  .gear-menu{ display:none; position:absolute; top:42px; left:0; background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.08); min-width:170px; overflow:hidden; z-index:60; }
  .gear-menu.open{ display:block; }
  .gear-menu a, .gear-menu button{ display:block; width:100%; text-align:right; padding:10px 14px; font-size:13px; color:var(--text); text-decoration:none; background:none; border:none; cursor:pointer; font-family:var(--sans); }
  .gear-menu a:hover, .gear-menu button:hover{ background:var(--bg); }
  .gear-menu button{ color:var(--coral); border-top:1px solid var(--border); }
  .login-link{ font-size:12.5px; color:var(--blue-dark); text-decoration:none; font-weight:600; }

  .my-jobs{ margin-top:22px; }
  .my-jobs h2{ font-size:15px; font-weight:700; margin-bottom:10px; }
  .my-job{ background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .my-job .t{ font-size:13.5px; font-weight:600; }
  .my-job .c{ font-size:11.5px; color:var(--text-dim); margin-top:2px; }
  .my-job button{ background:none; border:1px solid var(--coral); color:var(--coral); font-size:11.5px; padding:5px 12px; border-radius:6px; cursor:pointer; font-weight:600; white-space:nowrap; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand"><div class="mark">ش</div><div class="name">شفت <span>/ Shift</span></div></a>
    <div class="topbar-icons" id="topbarIcons"></div>
  </div>
</div>
<div class="wrap">
  <header>
    <a href="index.html" class="back-link">← رجوع لكل الشواغر</a>
  </header>

  <div class="panel">

    <!-- Logged out: login/signup -->
    <div id="authForms">
      <div class="tabs">
        <div class="tab active" id="tabLogin">تسجيل دخول</div>
        <div class="tab" id="tabSignup">حساب جديد</div>
      </div>

      <form id="loginForm">
        <div class="field"><label>الإيميل</label><input type="email" id="loginEmail" required></div>
        <div class="field"><label>كلمة السر</label><input type="password" id="loginPassword" required></div>
        <button type="submit" class="btn">تسجيل دخول</button>
        <div class="form-msg" id="loginMsg"></div>
        <div style="text-align:center; margin-top:12px;">
          <a href="#" id="forgotLink" style="font-size:12.5px; color:var(--text-dim); text-decoration:underline;">نسيت كلمة السر؟</a>
        </div>
      </form>

      <form id="resetForm" style="display:none;">
        <div class="hint" style="margin-bottom:14px;">اكتب إيميلك وبنبعتلك رابط لتعيين كلمة سر جديدة.</div>
        <div class="field"><label>الإيميل</label><input type="email" id="resetEmail" required></div>
        <button type="submit" class="btn">إرسال رابط إعادة التعيين</button>
        <div class="form-msg" id="resetMsg"></div>
        <div style="text-align:center; margin-top:12px;">
          <a href="#" id="backToLoginLink" style="font-size:12.5px; color:var(--text-dim); text-decoration:underline;">رجوع لتسجيل الدخول</a>
        </div>
      </form>

      <form id="newPasswordForm" style="display:none;">
        <h2>تعيين كلمة سر جديدة</h2>
        <div class="hint">اكتب كلمة السر الجديدة لحسابك.</div>
        <div class="field"><label>كلمة السر الجديدة</label><input type="password" id="newPassword" required minlength="6"></div>
        <button type="submit" class="btn">حفظ كلمة السر</button>
        <div class="form-msg" id="newPasswordMsg"></div>
      </form>

      <form id="signupForm" style="display:none;">
        <div class="field"><label>الاسم</label><input type="text" id="signupName" required></div>
        <div class="field"><label>الإيميل</label><input type="email" id="signupEmail" required></div>
        <div class="field"><label>كلمة السر</label><input type="password" id="signupPassword" required minlength="6"></div>
        <button type="submit" class="btn">إنشاء حساب</button>
        <div class="form-msg" id="signupMsg"></div>
      </form>
    </div>

    <!-- Logged in -->
    <div id="loggedInPanel" style="display:none;">
      <div class="who-badge">
        <span id="whoName"></span>
      </div>

      <h2>انشر طلب عمال</h2>
      <div class="hint">طلبك بيظهر مباشرة بالصفحة الرئيسية لكل الزوار.</div>
      <form id="jobForm">
        <div class="field"><label>عنوان الوظيفة</label><input type="text" id="fTitle" required placeholder="مثال: مختص دعم IT ليوم واحد"></div>
        <div class="field"><label>المجال</label>
          <select id="fCategory">
            <option selected>عمالة يدوية</option>
            <option>تقنية / IT</option>
            <option>إداري / مكتبي</option>
            <option>ضيافة / مطاعم</option>
            <option>تعليم / تدريب</option>
            <option>تصميم / محتوى</option>
            <option>أخرى</option>
          </select>
        </div>
        <div class="field row2">
          <div><label>المدة</label>
            <div class="row2" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
              <input type="number" id="fDurationNum" min="1" value="1">
              <select id="fDurationUnit">
                <option value="ساعات">ساعات</option>
                <option value="أيام" selected>أيام</option>
              </select>
            </div>
          </div>
          <div><label>المدينة</label>
            <select id="fCity">
              <option>عمّان</option>
              <option>إربد</option>
              <option>البلقاء</option>
              <option>جرش</option>
              <option>الزرقاء</option>
              <option>الطفيلة</option>
              <option>عجلون</option>
              <option>العقبة</option>
              <option>الكرك</option>
              <option>مادبا</option>
              <option>المفرق</option>
              <option>معان</option>
            </select>
          </div>
        </div>
        <div class="field"><label>عدد العمال المطلوب</label><input type="number" id="fCount" min="1" value="1"></div>
        <div class="field"><label>الأجر اليومي (تقريبي)</label><input type="text" id="fWage"></div>
        <div class="field"><label>رقم التواصل</label><input type="tel" id="fPhone" required placeholder="مثال: 07XXXXXXXX"></div>
        <div class="field"><label>تفاصيل إضافية</label><textarea id="fDesc" placeholder="ساعات الدوام، شروط..."></textarea></div>
        <div class="checks">
          <label><input type="checkbox" id="fUrgent">مستعجل</label>
          <label><input type="checkbox" id="fSkilled">يتطلب شهادة/تخصص</label>
        </div>
        <button type="submit" class="btn">انشر الطلب</button>
        <div class="form-msg" id="formMsg"></div>
      </form>

      <div class="my-jobs" id="myJobsSection">
        <h2>إعلاناتك المنشورة</h2>
        <div id="myJobsList"></div>
      </div>

      <div class="my-jobs">
        <h2>الوظائف المحفوظة</h2>
        <div id="savedJobsList"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mkmynymssnvcinbdiqmr.supabase.co";
const SUPABASE_KEY = "sb_publishable_48UUMnF_UL_FPQkPeR0hOQ_rrtd7k33";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;

const tabLogin = document.getElementById('tabLogin');
const tabSignup = document.getElementById('tabSignup');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');
tabLogin.onclick = () => { tabLogin.classList.add('active'); tabSignup.classList.remove('active'); loginForm.style.display='block'; signupForm.style.display='none'; document.getElementById('resetForm').style.display='none'; };
tabSignup.onclick = () => { tabSignup.classList.add('active'); tabLogin.classList.remove('active'); signupForm.style.display='block'; loginForm.style.display='none'; document.getElementById('resetForm').style.display='none'; };

document.getElementById('forgotLink').onclick = (e) => {
  e.preventDefault();
  loginForm.style.display='none';
  document.getElementById('resetForm').style.display='block';
};
document.getElementById('backToLoginLink').onclick = (e) => {
  e.preventDefault();
  document.getElementById('resetForm').style.display='none';
  loginForm.style.display='block';
};
document.getElementById('resetForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const msg = document.getElementById('resetMsg');
  msg.style.display='block'; msg.className='form-msg'; msg.textContent='جاري الإرسال...';
  const email = document.getElementById('resetEmail').value;
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href.split('#')[0] });
  if(error){ msg.className='form-msg err'; msg.textContent = 'صار خطأ: ' + error.message; return; }
  msg.className='form-msg ok';
  msg.textContent = '✓ إذا الإيميل مسجل عندنا، رح يوصلك رابط لتعيين كلمة سر جديدة.';
  this.reset();
});

let isRecoveryFlow = window.location.hash.includes('type=recovery');

sb.auth.onAuthStateChange((event, session) => {
  if(event === 'PASSWORD_RECOVERY'){
    document.getElementById('authForms').style.display = 'block';
    document.getElementById('loggedInPanel').style.display = 'none';
    loginForm.style.display = 'none';
    signupForm.style.display = 'none';
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('newPasswordForm').style.display = 'block';
  }
});

document.getElementById('newPasswordForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const msg = document.getElementById('newPasswordMsg');
  msg.style.display='block'; msg.className='form-msg'; msg.textContent='جاري الحفظ...';
  const newPassword = document.getElementById('newPassword').value;
  const { error } = await sb.auth.updateUser({ password: newPassword });
  if(error){ msg.className='form-msg err'; msg.textContent = 'صار خطأ: ' + error.message; return; }
  msg.className='form-msg ok';
  msg.textContent = '✓ تم تغيير كلمة السر. رح تسجل دخول تلقائياً.';
  setTimeout(async () => {
    isRecoveryFlow = false;
    document.getElementById('newPasswordForm').style.display = 'none';
    await loadSession();
  }, 1500);
});

document.getElementById('signupForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const msg = document.getElementById('signupMsg');
  msg.style.display='block'; msg.className='form-msg'; msg.textContent = 'جاري إنشاء الحساب...';
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const fullName = document.getElementById('signupName').value;

  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: fullName }, emailRedirectTo: window.location.href }
  });

  if(error){ msg.className='form-msg err'; msg.textContent = 'صار خطأ: ' + error.message; return; }
  msg.className='form-msg ok';
  msg.textContent = '✓ تم إنشاء الحساب! تحقق من إيميلك واضغط رابط التفعيل قبل ما تسجل دخول.';
  this.reset();
});

document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const msg = document.getElementById('loginMsg');
  msg.style.display='block'; msg.className='form-msg'; msg.textContent = 'جاري تسجيل الدخول...';
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    msg.className='form-msg err';
    msg.textContent = error.message.includes('Email not confirmed')
      ? 'لازم تفعّل إيميلك أولاً — تحقق من صندوق الوارد.'
      : 'خطأ: تأكد من الإيميل وكلمة السر.';
    return;
  }
  msg.style.display='none';
  await loadSession();
});

async function renderTopbar(user){
  const box = document.getElementById('topbarIcons');
  if(!user){
    box.innerHTML = `<a href="post.html" class="login-link">تسجيل دخول</a>`;
    return;
  }
  const { data: myJobs } = await sb.from('jobs').select('renewed_at, created_at').eq('company_id', user.id);
  const needsRenewal = (myJobs || []).filter(j => daysSince(j.renewed_at || j.created_at) >= 7).length;

  box.innerHTML = `
    <button id="bellBtn" class="icon-btn" title="الإشعارات">🔔<span id="bellCount" class="bell-count">${needsRenewal}</span></button>
    <div class="gear-wrap">
      <button id="gearBtn" class="icon-btn" title="الحساب">⚙️</button>
      <div id="gearMenu" class="gear-menu">
        <a href="profile.html">الصفحة الشخصية</a>
        <a href="post.html">الإعدادات</a>
        <button id="logoutBtn">تسجيل خروج</button>
      </div>
    </div>
  `;
  document.getElementById('bellCount').style.display = needsRenewal > 0 ? 'flex' : 'none';

  document.getElementById('bellBtn').onclick = () => {
    const section = document.getElementById('myJobsSection');
    if(section) section.scrollIntoView({ behavior: 'smooth' });
  };
  const gearBtn = document.getElementById('gearBtn');
  const gearMenu = document.getElementById('gearMenu');
  gearBtn.onclick = (e) => { e.stopPropagation(); gearMenu.classList.toggle('open'); };
  document.addEventListener('click', () => gearMenu.classList.remove('open'));
  document.getElementById('logoutBtn').onclick = async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  };
}

async function loadSession(){
  if(isRecoveryFlow){
    document.getElementById('authForms').style.display = 'block';
    document.getElementById('loggedInPanel').style.display = 'none';
    loginForm.style.display = 'none';
    signupForm.style.display = 'none';
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('newPasswordForm').style.display = 'block';
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session ? session.user : null;
    await renderTopbar(currentUser);
    return;
  }

  const { data: { session } } = await sb.auth.getSession();
  currentUser = session ? session.user : null;
  await renderTopbar(currentUser);

  if(!currentUser){
    document.getElementById('authForms').style.display = 'block';
    document.getElementById('loggedInPanel').style.display = 'none';
    currentProfile = null;
    return;
  }

  let { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if(!profile){
    const meta = currentUser.user_metadata || {};
    const { data: created } = await sb.from('profiles')
      .upsert({ id: currentUser.id, full_name: meta.full_name || currentUser.email })
      .select().single();
    profile = created;
  }
  currentProfile = profile;

  document.getElementById('authForms').style.display = 'none';
  document.getElementById('loggedInPanel').style.display = 'block';
  document.getElementById('whoName').textContent = profile ? profile.full_name : currentUser.email;

  await loadMyJobs();
  await loadSavedJobs();
}

document.getElementById('jobForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  msg.style.display='block'; msg.className='form-msg'; msg.textContent = 'جاري النشر...';

  const newJob = {
    company_id: currentUser.id,
    company_name: currentProfile ? currentProfile.full_name : currentUser.email,
    title: document.getElementById('fTitle').value,
    category: document.getElementById('fCategory').value,
    duration: Number(document.getElementById('fDurationNum').value),
    duration_unit: document.getElementById('fDurationUnit').value,
    city: document.getElementById('fCity').value,
    count: document.getElementById('fCount').value || 1,
    wage: document.getElementById('fWage').value,
    phone: document.getElementById('fPhone').value,
    job_desc: document.getElementById('fDesc').value,
    urgent: document.getElementById('fUrgent').checked,
    skilled: document.getElementById('fSkilled').checked
  };

  const { error } = await sb.from('jobs').insert(newJob);
  if(error){ msg.className='form-msg err'; msg.textContent = 'صار خطأ: ' + error.message; return; }
  msg.className='form-msg ok'; msg.textContent = '✓ تم نشر الوظيفة بنجاح.';
  this.reset();
  document.getElementById('fDurationNum').value = '1';
  document.getElementById('fDurationUnit').value = 'أيام';
  document.getElementById('fCount').value = '1';
  await loadMyJobs();
});

function daysSince(dateStr){
  return (Date.now() - new Date(dateStr).getTime()) / (1000*60*60*24);
}

async function loadMyJobs(){
  const { data, error } = await sb.from('jobs').select('*').eq('company_id', currentUser.id).order('created_at', { ascending: false });
  const list = document.getElementById('myJobsList');
  if(error || !data || data.length === 0){
    list.innerHTML = `<div style="font-size:12.5px; color:var(--text-dim);">لسا ما نشرت أي إعلان.</div>`;
    document.getElementById('bellCount').style.display = 'none';
    return;
  }

  const needsRenewal = data.filter(j => daysSince(j.renewed_at || j.created_at) >= 7);
  const bellCount = document.getElementById('bellCount');
  if(needsRenewal.length > 0){
    bellCount.textContent = needsRenewal.length;
    bellCount.style.display = 'flex';
  } else {
    bellCount.style.display = 'none';
  }

  list.innerHTML = data.map(j => {
    const age = daysSince(j.renewed_at || j.created_at);
    if(age >= 7){
      return `
        <div class="my-job" data-jobid="${j.id}" style="flex-direction:column; align-items:stretch; border-color:var(--coral); background:#FFF8F5;">
          <div style="margin-bottom:8px;">
            <div class="t">${j.title}</div>
            <div class="c">${j.city} · مرق عليها ${Math.floor(age)} أيام — لسا متاحة الوظيفة؟</div>
          </div>
          <div style="display:flex; gap:8px;">
            <button data-renew="${j.id}" style="flex:1; background:var(--green); color:#fff; border:none; padding:7px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer;">لسا متاحة — جدد 7 أيام</button>
            <button data-id="${j.id}" style="flex:1; background:none; border:1px solid var(--coral); color:var(--coral);">خلص — احذف</button>
          </div>
        </div>`;
    }
    return `
    <div class="my-job">
      <div>
        <div class="t">${j.title}</div>
        <div class="c">${j.city} · ${j.duration} ${j.duration_unit || 'أيام'} · ${j.clicks || 0} شخص ضغط على الرقم</div>
      </div>
      <button data-id="${j.id}">حذف</button>
    </div>
  `;
  }).join('');

  list.querySelectorAll('button[data-renew]').forEach(btn => {
    btn.onclick = async () => {
      await sb.from('jobs').update({ renewed_at: new Date().toISOString() }).eq('id', btn.dataset.renew);
      await loadMyJobs();
    };
  });
  list.querySelectorAll('button[data-id]').forEach(btn => {
    btn.onclick = async () => {
      await sb.from('jobs').delete().eq('id', btn.dataset.id);
      await loadMyJobs();
    };
  });
}

async function loadSavedJobs(){
  const list = document.getElementById('savedJobsList');
  const { data, error } = await sb.from('saved_jobs').select('job_id, jobs(*)').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  if(error || !data || data.length === 0){
    list.innerHTML = `<div style="font-size:12.5px; color:var(--text-dim);">ما فيه وظائف محفوظة لسا.</div>`;
    return;
  }
  list.innerHTML = data.filter(r => r.jobs).map(r => `
    <div class="my-job">
      <div>
        <div class="t">${r.jobs.title}</div>
        <div class="c">${r.jobs.company_name || ''} · ${r.jobs.city}</div>
      </div>
      <div style="display:flex; gap:6px;">
        <a href="job.html?id=${r.job_id}" style="font-size:11.5px; color:var(--blue-dark); text-decoration:underline; align-self:center;">التفاصيل</a>
        <button data-unsave="${r.job_id}">إزالة</button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('button[data-unsave]').forEach(btn => {
    btn.onclick = async () => {
      await sb.from('saved_jobs').delete().eq('user_id', currentUser.id).eq('job_id', btn.dataset.unsave);
      await loadSavedJobs();
    };
  });
}

loadSession();
</script>
