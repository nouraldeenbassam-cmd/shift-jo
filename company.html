<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة الشركة — يومي / Yaumee</title>
<link rel="icon" type="image/svg+xml" href="shift-logo.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');
  :root{
    --bg:#FAFAF8; --card:#FFFFFF; --border:#E5E3DC; --border-strong:#D3D1C7;
    --text:#2C2C2A; --text-dim:#726F66; --blue:#378ADD; --blue-dark:#0C447C;
    --green:#639922; --green-dark:#27500A; --coral:#D85A30;
    --sans:'Tajawal', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); }
  .wrap{ max-width:520px; margin:0 auto; padding:0 22px 90px; }

  header{ padding:30px 0 22px; }
  .brand{ display:flex; align-items:center; gap:8px; text-decoration:none; }
  .brand .name{ font-weight:900; font-size:17px; letter-spacing:-0.01em; }
  .brand .name span{ color:var(--blue); }
  .back-link{ display:inline-block; margin-top:14px; font-size:12.5px; color:var(--text-dim); text-decoration:none; }
  .back-link:hover{ text-decoration:underline; }

  .topbar{ position:sticky; top:0; z-index:50; background:var(--card); border-bottom:1px solid var(--border); }
  .topbar-inner{ max-width:520px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; justify-content:space-between; }
  .topbar-icons{ display:flex; align-items:center; gap:8px; }
  .icon-btn{ position:relative; background:none; border:1px solid var(--border-strong); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .bell-count{ display:none; position:absolute; top:-6px; left:-6px; background:var(--coral); color:#fff; font-size:10px; font-weight:700; border-radius:50%; width:16px; height:16px; align-items:center; justify-content:center; }
  .gear-wrap{ position:relative; }
  .gear-menu{ display:none; position:absolute; top:42px; left:0; background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.08); min-width:170px; overflow:hidden; z-index:60; }
  .gear-menu.open{ display:block; }
  .gear-menu a, .gear-menu button{ display:block; width:100%; text-align:right; padding:10px 14px; font-size:13px; color:var(--text); text-decoration:none; background:none; border:none; cursor:pointer; font-family:var(--sans); }
  .gear-menu a:hover, .gear-menu button:hover{ background:var(--bg); }
  .gear-menu button{ color:var(--coral); border-top:1px solid var(--border); }
  .login-link{ font-size:12.5px; color:var(--blue-dark); text-decoration:none; font-weight:600; }

  .panel{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:26px; text-align:center; }
  .avatar{ width:64px; height:64px; border-radius:50%; background:var(--blue); color:#fff; font-size:26px; font-weight:900; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  .cname{ font-size:19px; font-weight:800; }
  .cbio{ margin-top:10px; font-size:13.5px; color:var(--text); line-height:1.7; }
  .cwebsite{ margin-top:10px; font-size:13px; }
  .cwebsite a{ color:var(--blue); text-decoration:none; }
  .cwebsite a:hover{ text-decoration:underline; }
  .meta-row{ margin-top:18px; padding-top:16px; border-top:1px solid var(--border); font-size:12.5px; color:var(--text-dim); }

  .section-title{ font-size:13px; font-weight:700; color:var(--text-dim); margin:26px 0 10px; text-align:right; }
  .job-item{ display:block; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:8px; text-decoration:none; color:var(--text); text-align:right; }
  .job-item:hover{ border-color:var(--border-strong); }
  .job-item .jt{ font-weight:700; font-size:14px; }
  .job-item .jm{ font-size:12px; color:var(--text-dim); margin-top:3px; }
  .empty-jobs{ text-align:center; color:var(--text-dim); font-size:13px; padding:16px; }

  .loading{ text-align:center; padding:60px 20px; color:var(--text-dim); font-size:13px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand"><img src="shift-logo.svg" alt="Yaumee" style="width:28px;height:28px;border-radius:8px;display:block;"><div class="name">يومي <span>/ Yaumee</span></div></a>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="langBtn" class="icon-btn" style="width:auto; padding:0 10px; font-size:12px; font-weight:700;">AR</button>
      <div class="topbar-icons" id="topbarIcons"></div>
    </div>
  </div>
</div>
<div class="wrap">
  <header>
    <a href="index.html" class="back-link" data-i18n="back_link">← Back to all jobs</a>
  </header>

  <div id="loading" class="loading" data-i18n="loading_text">Loading...</div>

  <div id="companyCard" style="display:none;">
    <div class="panel">
      <div class="avatar" id="avatarLetter"></div>
      <div class="cname" id="cName" dir="auto"></div>
      <div class="cbio" id="cBio" dir="auto"></div>
      <div class="cwebsite" id="cWebsite" dir="auto"></div>
      <div class="meta-row"><span id="joinDate"></span> · <span data-i18n="member_since">Member since</span></div>
    </div>

    <div class="section-title" data-i18n="open_jobs">Open positions</div>
    <div id="jobsList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mkmynymssnvcinbdiqmr.supabase.co";
const SUPABASE_KEY = "sb_publishable_48UUMnF_UL_FPQkPeR0hOQ_rrtd7k33";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function daysSince(dateStr){
  return (Date.now() - new Date(dateStr).getTime()) / (1000*60*60*24);
}

const I18N = {
  en: {
    back_link: "← Back to all jobs", loading_text: "Loading...",
    not_found: "This company profile isn't available.", no_link: "No valid company link.",
    member_since: "Member since", open_jobs: "Open positions", no_open_jobs: "No open positions right now.",
    login_link: "Log in / Sign up",
    gear_profile: "Profile", gear_settings: "Settings", gear_logout: "Log out", bell_title: "Notifications", account_title: "Account",
    no_notifs: "No new notifications", renew_prompt: "posted {days} days ago — still open?"
  },
  ar: {
    back_link: "← رجوع لكل الشواغر", loading_text: "جاري التحميل...",
    not_found: "بروفايل هاي الشركة مش متاح.", no_link: "ما فيه رابط شركة صحيح.",
    member_since: "عضو منذ", open_jobs: "الشواغر المتاحة", no_open_jobs: "ما فيه شواغر متاحة حالياً.",
    login_link: "تسجيل دخول / حساب جديد",
    gear_profile: "الصفحة الشخصية", gear_settings: "الإعدادات", gear_logout: "تسجيل خروج", bell_title: "الإشعارات", account_title: "الحساب",
    no_notifs: "ما فيه إشعارات جديدة", renew_prompt: "مرق عليها {days} أيام — لسا متاحة؟"
  }
};

function getLang(){ return localStorage.getItem('shift_lang') || 'en'; }

function applyLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  const btn = document.getElementById('langBtn');
  if(btn) btn.textContent = lang === 'ar' ? 'EN' : 'AR';
  if(company) render();
}

async function setLang(lang){
  localStorage.setItem('shift_lang', lang);
  if(currentUser){
    await sb.from('profiles').update({ lang }).eq('id', currentUser.id);
  }
  applyLang(lang);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('langBtn').onclick = () => setLang(getLang() === 'ar' ? 'en' : 'ar');
});

async function renderTopbar(user){
  const box = document.getElementById('topbarIcons');
  const t = I18N[getLang()];
  if(!user){
    box.innerHTML = `<a href="post.html" class="login-link">${t.login_link}</a>`;
    return;
  }
  const { data: myJobs } = await sb.from('jobs').select('id, title, renewed_at, created_at').eq('company_id', user.id);
  const stale = (myJobs || []).filter(j => daysSince(j.renewed_at || j.created_at) >= 7);
  const notifHtml = stale.length === 0
    ? `<div style="padding:14px; font-size:12.5px; color:var(--text-dim);">${t.no_notifs}</div>`
    : stale.map(j => `<a href="notifications.html" dir="auto">${escapeHtml(j.title)} — ${t.renew_prompt.replace('{days}', Math.floor(daysSince(j.renewed_at || j.created_at)))}</a>`).join('');

  box.innerHTML = `
    <div class="gear-wrap">
      <button id="bellBtn" class="icon-btn" title="${t.bell_title}">🔔<span id="bellCount" class="bell-count">${stale.length}</span></button>
      <div id="notifMenu" class="gear-menu" style="min-width:240px;">${notifHtml}</div>
    </div>
    <div class="gear-wrap">
      <button id="gearBtn" class="icon-btn" title="${t.account_title}">⚙️</button>
      <div id="gearMenu" class="gear-menu">
        <a href="profile.html">${t.gear_profile}</a>
        <a href="settings.html">${t.gear_settings}</a>
        <button id="logoutBtn">${t.gear_logout}</button>
      </div>
    </div>
  `;
  document.getElementById('bellCount').style.display = stale.length > 0 ? 'flex' : 'none';
  const bellBtn = document.getElementById('bellBtn');
  const notifMenu = document.getElementById('notifMenu');
  const gearBtn = document.getElementById('gearBtn');
  const gearMenu = document.getElementById('gearMenu');
  bellBtn.onclick = (e) => { e.stopPropagation(); notifMenu.classList.toggle('open'); gearMenu.classList.remove('open'); };
  gearBtn.onclick = (e) => { e.stopPropagation(); gearMenu.classList.toggle('open'); notifMenu.classList.remove('open'); };
  document.addEventListener('click', () => { gearMenu.classList.remove('open'); notifMenu.classList.remove('open'); });
  document.getElementById('logoutBtn').onclick = async () => {
    await sb.auth.signOut();
    window.location.reload();
  };
}

const params = new URLSearchParams(window.location.search);
const companyId = params.get('id');

let currentUser = null;
let company = null;
let openJobs = [];

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session ? session.user : null;

  if(currentUser){
    const { data: profile } = await sb.from('profiles').select('lang').eq('id', currentUser.id).single();
    if(profile && profile.lang) localStorage.setItem('shift_lang', profile.lang);
  }
  applyLang(getLang());
  await renderTopbar(currentUser);

  if(!companyId){
    document.getElementById('loading').textContent = I18N[getLang()].no_link;
    return;
  }

  const { data, error } = await sb.from('profiles_public').select('*').eq('id', companyId).single();
  if(error || !data){
    document.getElementById('loading').textContent = I18N[getLang()].not_found;
    return;
  }
  company = data;

  const { data: jobsData } = await sb.from('jobs').select('id, title, city, wage, wage_type').eq('company_id', companyId).order('created_at', { ascending: false });
  openJobs = jobsData || [];

  render();
}

function render(){
  const t = I18N[getLang()];
  document.getElementById('loading').style.display = 'none';
  document.getElementById('companyCard').style.display = 'block';

  const name = company.full_name || '—';
  document.getElementById('avatarLetter').textContent = name ? name.trim().charAt(0) : '?';
  document.getElementById('cName').textContent = name;
  document.getElementById('cBio').textContent = company.bio || '';
  document.getElementById('cBio').style.display = company.bio ? 'block' : 'none';

  const websiteBox = document.getElementById('cWebsite');
  if(company.company_website){
    const url = /^https?:\/\//.test(company.company_website) ? company.company_website : `https://${company.company_website}`;
    websiteBox.innerHTML = `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(company.company_website)}</a>`;
    websiteBox.style.display = 'block';
  } else {
    websiteBox.style.display = 'none';
  }

  const joined = new Date(company.created_at);
  const locale = getLang() === 'ar' ? 'ar-EG' : 'en-US';
  document.getElementById('joinDate').textContent = joined.toLocaleDateString(locale, { year: 'numeric', month: 'long', day: 'numeric' });

  const jobsList = document.getElementById('jobsList');
  if(openJobs.length === 0){
    jobsList.innerHTML = `<div class="empty-jobs">${t.no_open_jobs}</div>`;
  } else {
    jobsList.innerHTML = openJobs.map(j => `
      <a class="job-item" href="job.html?id=${j.id}">
        <div class="jt" dir="auto">${escapeHtml(j.title)}</div>
        <div class="jm" dir="auto">${escapeHtml(j.city || '')}</div>
      </a>
    `).join('');
  }
}

init();
</script>
</body>
</html>
