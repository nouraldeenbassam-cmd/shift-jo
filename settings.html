<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Shift</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');
  :root{
    --bg:#FAFAF8; --card:#FFFFFF; --border:#E5E3DC; --border-strong:#D3D1C7;
    --text:#2C2C2A; --text-dim:#726F66; --blue:#378ADD; --blue-dark:#0C447C;
    --green:#639922; --green-dark:#27500A; --coral:#D85A30;
    --sans:'Tajawal', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); }
  .wrap{ max-width:520px; margin:0 auto; padding:0 22px 90px; }

  header{ padding:30px 0 22px; }
  .brand{ display:flex; align-items:center; gap:8px; text-decoration:none; }
  .brand .mark{ width:28px; height:28px; border-radius:8px; background:var(--blue); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px; }
  .brand .name{ font-weight:900; font-size:17px; letter-spacing:-0.01em; }
  .brand .name span{ color:var(--blue); }
  .back-link{ display:inline-block; margin-top:14px; font-size:12.5px; color:var(--text-dim); text-decoration:none; }
  .back-link:hover{ text-decoration:underline; }

  .topbar{ position:sticky; top:0; z-index:50; background:var(--card); border-bottom:1px solid var(--border); }
  .topbar-inner{ max-width:520px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; justify-content:space-between; }
  .topbar-icons{ display:flex; align-items:center; gap:8px; }
  .icon-btn{ position:relative; background:none; border:1px solid var(--border-strong); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .bell-count{ display:none; position:absolute; top:-6px; left:-6px; background:var(--coral); color:#fff; font-size:10px; font-weight:700; border-radius:50%; width:16px; height:16px; align-items:center; justify-content:center; }
  .gear-wrap{ position:relative; }
  .gear-menu{ display:none; position:absolute; top:42px; left:0; background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.08); min-width:170px; overflow:hidden; z-index:60; }
  .gear-menu.open{ display:block; }
  .gear-menu a, .gear-menu button{ display:block; width:100%; text-align:right; padding:10px 14px; font-size:13px; color:var(--text); text-decoration:none; background:none; border:none; cursor:pointer; font-family:var(--sans); }
  .gear-menu a:hover, .gear-menu button:hover{ background:var(--bg); }
  .gear-menu button{ color:var(--coral); border-top:1px solid var(--border); }
  .login-link{ font-size:12.5px; color:var(--blue-dark); text-decoration:none; font-weight:600; }

  .panel{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:26px; }
  .panel h2{ font-size:16px; font-weight:700; margin-bottom:4px; }
  .panel .hint{ color:var(--text-dim); font-size:12.5px; margin-bottom:16px; }

  .lang-options{ display:flex; gap:10px; }
  .lang-opt{ flex:1; border:1px solid var(--border-strong); border-radius:10px; padding:14px; text-align:center; cursor:pointer; font-weight:600; font-size:14px; }
  .lang-opt.active{ border-color:var(--blue); background:rgba(55,138,221,0.08); color:var(--blue-dark); }

  .form-msg{ font-size:12px; margin-top:12px; display:none; font-weight:500; }
  .form-msg.ok{ color:var(--green-dark); }

  .loading{ text-align:center; padding:60px 20px; color:var(--text-dim); font-size:13px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand"><div class="mark">ش</div><div class="name">شفت <span>/ Shift</span></div></a>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="langBtn" class="icon-btn" style="width:auto; padding:0 10px; font-size:12px; font-weight:700;">AR</button>
      <div class="topbar-icons" id="topbarIcons"></div>
    </div>
  </div>
</div>
<div class="wrap">
  <header>
    <a href="post.html" class="back-link" data-i18n="back_link">← Back to account</a>
  </header>

  <div id="loading" class="loading" data-i18n="loading_text">Loading...</div>

  <div class="panel" id="settingsCard" style="display:none;">
    <h2 data-i18n="lang_title">Site language</h2>
    <div class="hint" data-i18n="lang_hint">This preference is saved to your account and applies wherever you log in.</div>
    <div class="lang-options">
      <div class="lang-opt" id="optEn" data-i18n="opt_en">English</div>
      <div class="lang-opt" id="optAr" data-i18n="opt_ar">العربية</div>
    </div>
    <div class="form-msg" id="settingsMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mkmynymssnvcinbdiqmr.supabase.co";
const SUPABASE_KEY = "sb_publishable_48UUMnF_UL_FPQkPeR0hOQ_rrtd7k33";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

const I18N = {
  en: {
    back_link: "← Back to account", loading_text: "Loading...", lang_title: "Site language",
    lang_hint: "This preference is saved to your account and applies wherever you log in.",
    opt_en: "English", opt_ar: "العربية", saved_msg: "✓ Saved.", login_link: "Log in",
    must_login: "You need to log in first."
  },
  ar: {
    back_link: "← رجوع لصفحة الحساب", loading_text: "جاري التحميل...", lang_title: "لغة الموقع",
    lang_hint: "هالإعداد بينحفظ بحسابك وبينطبق أي ما سجلت دخول.",
    opt_en: "English", opt_ar: "العربية", saved_msg: "✓ تم الحفظ.", login_link: "تسجيل دخول",
    must_login: "لازم تسجل دخول أولاً."
  }
};

function getLang(){ return localStorage.getItem('shift_lang') || 'en'; }

function applyLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  const btn = document.getElementById('langBtn');
  if(btn) btn.textContent = lang === 'ar' ? 'EN' : 'AR';
  document.getElementById('optEn').classList.toggle('active', lang === 'en');
  document.getElementById('optAr').classList.toggle('active', lang === 'ar');
}

async function setLang(lang){
  localStorage.setItem('shift_lang', lang);
  if(currentUser){
    await sb.from('profiles').update({ lang }).eq('id', currentUser.id);
    const msg = document.getElementById('settingsMsg');
    msg.style.display = 'block'; msg.className = 'form-msg ok'; msg.textContent = I18N[lang].saved_msg;
  }
  applyLang(lang);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('langBtn').onclick = () => setLang(getLang() === 'ar' ? 'en' : 'ar');
  document.getElementById('optEn').onclick = () => setLang('en');
  document.getElementById('optAr').onclick = () => setLang('ar');
});

async function renderTopbar(user){
  const box = document.getElementById('topbarIcons');
  if(!user){
    box.innerHTML = `<a href="post.html" class="login-link">${I18N[getLang()].login_link}</a>`;
    return;
  }
  const { data: myJobs } = await sb.from('jobs').select('renewed_at, created_at').eq('company_id', user.id);
  const needsRenewal = (myJobs || []).filter(j => (Date.now() - new Date(j.renewed_at || j.created_at).getTime())/(1000*60*60*24) >= 7).length;

  box.innerHTML = `
    <button id="bellBtn" class="icon-btn" title="Notifications">🔔<span id="bellCount" class="bell-count">${needsRenewal}</span></button>
    <div class="gear-wrap">
      <button id="gearBtn" class="icon-btn" title="Account">⚙️</button>
      <div id="gearMenu" class="gear-menu">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
        <button id="logoutBtn">Log out</button>
      </div>
    </div>
  `;
  document.getElementById('bellCount').style.display = needsRenewal > 0 ? 'flex' : 'none';
  document.getElementById('bellBtn').onclick = () => { window.location.href = 'post.html'; };
  const gearBtn = document.getElementById('gearBtn');
  const gearMenu = document.getElementById('gearMenu');
  gearBtn.onclick = (e) => { e.stopPropagation(); gearMenu.classList.toggle('open'); };
  document.addEventListener('click', () => gearMenu.classList.remove('open'));
  document.getElementById('logoutBtn').onclick = async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  };
}

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session ? session.user : null;

  if(currentUser){
    const { data: profile } = await sb.from('profiles').select('lang').eq('id', currentUser.id).single();
    if(profile && profile.lang) localStorage.setItem('shift_lang', profile.lang);
  }
  applyLang(getLang());
  await renderTopbar(currentUser);

  document.getElementById('loading').style.display = 'none';

  if(!currentUser){
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').textContent = I18N[getLang()].must_login;
    setTimeout(() => window.location.href = 'post.html', 1200);
    return;
  }

  document.getElementById('settingsCard').style.display = 'block';
}

init();
</script>
</body>
</html>
