<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة الشخصية — يومي / Yaumee</title>
<link rel="icon" type="image/svg+xml" href="shift-logo.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');
  :root{
    --bg:#FAFAF8; --card:#FFFFFF; --border:#E5E3DC; --border-strong:#D3D1C7;
    --text:#2C2C2A; --text-dim:#726F66; --blue:#378ADD; --blue-dark:#0C447C;
    --green:#639922; --green-dark:#27500A; --coral:#D85A30;
    --sans:'Tajawal', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); }
  .wrap{ max-width:520px; margin:0 auto; padding:0 22px 90px; }

  header{ padding:30px 0 22px; }
  .brand{ display:flex; align-items:center; gap:8px; text-decoration:none; }
  .brand .mark{ width:28px; height:28px; border-radius:8px; background:var(--blue); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px; }
  .brand .name{ font-weight:900; font-size:17px; letter-spacing:-0.01em; }
  .brand .name span{ color:var(--blue); }
  .back-link{ display:inline-block; margin-top:14px; font-size:12.5px; color:var(--text-dim); text-decoration:none; }
  .back-link:hover{ text-decoration:underline; }

  .topbar{ position:sticky; top:0; z-index:50; background:var(--card); border-bottom:1px solid var(--border); }
  .topbar-inner{ max-width:520px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; justify-content:space-between; }
  .topbar-icons{ display:flex; align-items:center; gap:8px; }
  .icon-btn{ position:relative; background:none; border:1px solid var(--border-strong); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .bell-count{ display:none; position:absolute; top:-6px; left:-6px; background:var(--coral); color:#fff; font-size:10px; font-weight:700; border-radius:50%; width:16px; height:16px; align-items:center; justify-content:center; }
  .gear-wrap{ position:relative; }
  .gear-menu{ display:none; position:absolute; top:42px; left:0; background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.08); min-width:170px; overflow:hidden; z-index:60; }
  .gear-menu.open{ display:block; }
  .gear-menu a, .gear-menu button{ display:block; width:100%; text-align:right; padding:10px 14px; font-size:13px; color:var(--text); text-decoration:none; background:none; border:none; cursor:pointer; font-family:var(--sans); }
  .gear-menu a:hover, .gear-menu button:hover{ background:var(--bg); }
  .gear-menu button{ color:var(--coral); border-top:1px solid var(--border); }
  .login-link{ font-size:12.5px; color:var(--blue-dark); text-decoration:none; font-weight:600; }

  .panel{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:26px; text-align:center; }
  .avatar{ width:64px; height:64px; border-radius:50%; background:var(--blue); color:#fff; font-size:26px; font-weight:900; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }

  .field{ margin-bottom:14px; text-align:right; }
  .field label{ display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:5px; font-weight:500; }
  .field input{
    width:100%; background:var(--bg); border:1px solid var(--border-strong); color:var(--text);
    padding:9px 11px; border-radius:8px; font-family:var(--sans); font-size:14px;
  }
  .field input:disabled{ color:var(--text-dim); }
  .field input:focus{ outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(55,138,221,0.12); }

  .btn{ width:100%; background:var(--blue); color:#fff; border:none; padding:12px; font-weight:700; font-size:14.5px; border-radius:8px; cursor:pointer; margin-top:6px; }
  .btn:hover{ background:var(--blue-dark); }
  .form-msg{ font-size:12px; margin-top:10px; display:none; font-weight:500; }
  .form-msg.ok{ color:var(--green-dark); }
  .form-msg.err{ color:var(--coral); }

  .meta-row{ display:flex; justify-content:space-between; font-size:12.5px; color:var(--text-dim); margin-top:18px; padding-top:16px; border-top:1px solid var(--border); }
  .view-row{ text-align:right; padding:10px 0; border-bottom:1px solid var(--border); }
  .view-row:last-of-type{ border-bottom:none; }
  .view-label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:3px; }
  .view-val{ display:block; font-size:14px; font-weight:600; word-break:break-word; }
  .view-val:empty::after{ content:"—"; color:var(--text-dim); font-weight:400; }

  .loading{ text-align:center; padding:60px 20px; color:var(--text-dim); font-size:13px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand"><img src="shift-logo.svg" alt="Yaumee" style="width:28px;height:28px;border-radius:8px;display:block;"><div class="name">يومي <span>/ Yaumee</span></div></a>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="langBtn" class="icon-btn" style="width:auto; padding:0 10px; font-size:12px; font-weight:700;">AR</button>
      <div class="topbar-icons" id="topbarIcons"></div>
    </div>
  </div>
</div>
<div class="wrap">
  <header>
    <a href="post.html" class="back-link" data-i18n="back_link">← Back to account</a>
  </header>

  <div id="loading" class="loading" data-i18n="loading_text">Loading...</div>

  <div class="panel" id="profileCard" style="display:none;">
    <div class="avatar" id="avatarLetter"></div>

    <div id="profileView">
      <div class="view-row"><span class="view-label" data-i18n="lbl_name">Name</span><span class="view-val" id="vName"></span></div>
      <div class="view-row"><span class="view-label" data-i18n="lbl_email">Email</span><span class="view-val" id="vEmail"></span></div>
      <div class="view-row"><span class="view-label" data-i18n="lbl_phone">Phone number</span><span class="view-val" id="vPhone"></span></div>
      <div class="view-row"><span class="view-label" data-i18n="lbl_personal_email">Personal email (optional)</span><span class="view-val" id="vPersonalEmail"></span></div>
      <div class="view-row"><span class="view-label" data-i18n="lbl_bio">About</span><span class="view-val" id="vBio"></span></div>
      <div class="view-row"><span class="view-label" data-i18n="lbl_website">Company website (optional)</span><span class="view-val" id="vWebsite"></span></div>
      <div class="view-row"><span class="view-label" data-i18n="lbl_age_group">Age group</span><span class="view-val" id="vAgeGroup"></span></div>
      <button type="button" class="btn" id="editBtn" data-i18n="btn_edit" style="margin-top:14px;">Edit</button>
    </div>

    <form id="profileForm" style="display:none;">
      <div class="field"><label data-i18n="lbl_name">Name</label><input type="text" id="pName" required></div>
      <div class="field"><label data-i18n="lbl_email">Email</label><input type="email" id="pEmail" disabled></div>
      <div class="field"><label data-i18n="lbl_phone">Phone number</label><input type="tel" id="pPhone"></div>
      <div class="field"><label data-i18n="lbl_personal_email">Personal email (optional)</label><input type="email" id="pPersonalEmail"></div>
      <div class="field"><label data-i18n="lbl_bio">About</label><textarea id="pBio" rows="3"></textarea></div>
      <div class="field"><label data-i18n="lbl_website">Company website (optional)</label><input type="text" id="pWebsite"></div>
      <div class="field"><label data-i18n="lbl_age_group">Age group</label>
        <select id="pAgeGroup">
          <option value="18-24">18–24</option>
          <option value="25-34">25–34</option>
          <option value="35-44">35–44</option>
          <option value="45+">45+</option>
        </select>
      </div>
      <button type="submit" class="btn" data-i18n="btn_save">Save changes</button>
      <button type="button" class="btn" id="cancelBtn" style="background:none; border:1px solid var(--border-strong); color:var(--text-dim); margin-top:8px;" data-i18n="btn_cancel">Cancel</button>
      <div class="form-msg" id="profileMsg"></div>
    </form>
    <div class="meta-row">
      <span id="joinDate"></span>
      <span data-i18n="member_since">Member since</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mkmynymssnvcinbdiqmr.supabase.co";
const SUPABASE_KEY = "sb_publishable_48UUMnF_UL_FPQkPeR0hOQ_rrtd7k33";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let currentUser = null;
let currentProfile = null;

function daysSince(dateStr){
  return (Date.now() - new Date(dateStr).getTime()) / (1000*60*60*24);
}

const I18N = {
  en: {
    back_link: "← Back to account", loading_text: "Loading...", lbl_name: "Name", lbl_email: "Email",
    lbl_phone: "Phone number", lbl_personal_email: "Personal email (optional)", lbl_bio: "About",
    lbl_website: "Company website (optional)", lbl_age_group: "Age group",
    btn_save: "Save changes", btn_edit: "Edit", btn_cancel: "Cancel", member_since: "Member since", login_link: "Log in", saved_msg: "✓ Saved.",
    must_login: "You need to log in first.",
    gear_profile: "Profile", gear_settings: "Settings", gear_logout: "Log out", bell_title: "Notifications", account_title: "Account",
    no_notifs: "No new notifications", renew_prompt: "posted {days} days ago — still open?"
  },
  ar: {
    back_link: "← رجوع لصفحة الحساب", loading_text: "جاري التحميل...", lbl_name: "الاسم", lbl_email: "الإيميل",
    lbl_phone: "رقم الهاتف", lbl_personal_email: "الإيميل الشخصي (اختياري)", lbl_bio: "نبذة",
    lbl_website: "موقع الشركة (اختياري)", lbl_age_group: "الفئة العمرية",
    btn_save: "حفظ التعديلات", btn_edit: "تعديل", btn_cancel: "إلغاء", member_since: "عضو منذ", login_link: "تسجيل دخول", saved_msg: "✓ تم الحفظ.",
    must_login: "لازم تسجل دخول أولاً.",
    gear_profile: "الصفحة الشخصية", gear_settings: "الإعدادات", gear_logout: "تسجيل خروج", bell_title: "الإشعارات", account_title: "الحساب",
    no_notifs: "ما فيه إشعارات جديدة", renew_prompt: "مرق عليها {days} أيام — لسا متاحة؟"
  }
};

function getLang(){ return localStorage.getItem('shift_lang') || 'en'; }

function applyLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  const btn = document.getElementById('langBtn');
  if(btn) btn.textContent = lang === 'ar' ? 'EN' : 'AR';
}

async function setLang(lang){
  localStorage.setItem('shift_lang', lang);
  if(currentUser){
    await sb.from('profiles').update({ lang }).eq('id', currentUser.id);
  }
  applyLang(lang);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('langBtn').onclick = () => setLang(getLang() === 'ar' ? 'en' : 'ar');
});

async function renderTopbar(user){
  const box = document.getElementById('topbarIcons');
  const t = I18N[getLang()];
  if(!user){
    box.innerHTML = `<a href="post.html" class="login-link">${t.login_link}</a>`;
    return;
  }
  const { data: myJobs } = await sb.from('jobs').select('id, title, renewed_at, created_at').eq('company_id', user.id);
  const stale = (myJobs || []).filter(j => daysSince(j.renewed_at || j.created_at) >= 7);
  const notifHtml = stale.length === 0
    ? `<div style="padding:14px; font-size:12.5px; color:var(--text-dim);">${t.no_notifs}</div>`
    : stale.map(j => `<a href="notifications.html" dir="auto">${escapeHtml(j.title)} — ${t.renew_prompt.replace('{days}', Math.floor(daysSince(j.renewed_at || j.created_at)))}</a>`).join('');

  box.innerHTML = `
    <div class="gear-wrap">
      <button id="bellBtn" class="icon-btn" title="${t.bell_title}">🔔<span id="bellCount" class="bell-count">${stale.length}</span></button>
      <div id="notifMenu" class="gear-menu" style="min-width:240px;">${notifHtml}</div>
    </div>
    <div class="gear-wrap">
      <button id="gearBtn" class="icon-btn" title="${t.account_title}">⚙️</button>
      <div id="gearMenu" class="gear-menu">
        <a href="profile.html">${t.gear_profile}</a>
        <a href="settings.html">${t.gear_settings}</a>
        <button id="logoutBtn">${t.gear_logout}</button>
      </div>
    </div>
  `;
  document.getElementById('bellCount').style.display = stale.length > 0 ? 'flex' : 'none';
  const bellBtn = document.getElementById('bellBtn');
  const notifMenu = document.getElementById('notifMenu');
  const gearBtn = document.getElementById('gearBtn');
  const gearMenu = document.getElementById('gearMenu');
  bellBtn.onclick = (e) => { e.stopPropagation(); notifMenu.classList.toggle('open'); gearMenu.classList.remove('open'); };
  gearBtn.onclick = (e) => { e.stopPropagation(); gearMenu.classList.toggle('open'); notifMenu.classList.remove('open'); };
  document.addEventListener('click', () => { gearMenu.classList.remove('open'); notifMenu.classList.remove('open'); });
  document.getElementById('logoutBtn').onclick = async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  };
}

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session ? session.user : null;
  document.getElementById('langBtn').style.display = currentUser ? 'none' : '';

  if(currentUser){
    const { data: langProfile } = await sb.from('profiles').select('lang').eq('id', currentUser.id).single();
    if(langProfile && langProfile.lang) localStorage.setItem('shift_lang', langProfile.lang);
  }
  applyLang(getLang());
  await renderTopbar(currentUser);

  if(!currentUser){
    document.getElementById('loading').textContent = I18N[getLang()].must_login;
    setTimeout(() => window.location.href = 'post.html', 1200);
    return;
  }

  let { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if(!profile){
    const meta = currentUser.user_metadata || {};
    const { data: created } = await sb.from('profiles')
      .upsert({ id: currentUser.id, full_name: meta.full_name || currentUser.email })
      .select().single();
    profile = created;
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('profileCard').style.display = 'block';

  currentProfile = profile;
  renderView();

  const joined = new Date(currentUser.created_at);
  const locale = getLang() === 'ar' ? 'ar-EG' : 'en-US';
  document.getElementById('joinDate').textContent = joined.toLocaleDateString(locale, { year: 'numeric', month: 'long', day: 'numeric' });
}

const AGE_LABEL = { '18-24':'18–24', '25-34':'25–34', '35-44':'35–44', '45+':'45+' };

function renderView(){
  const p = currentProfile || {};
  const name = p.full_name || currentUser.email;
  document.getElementById('avatarLetter').textContent = name ? name.trim().charAt(0) : '?';
  document.getElementById('vName').textContent = name || '';
  document.getElementById('vEmail').textContent = currentUser.email;
  document.getElementById('vPhone').textContent = p.phone || '';
  document.getElementById('vPersonalEmail').textContent = p.personal_email || '';
  document.getElementById('vBio').textContent = p.bio || '';
  document.getElementById('vWebsite').textContent = p.company_website || '';
  document.getElementById('vAgeGroup').textContent = p.age_group ? AGE_LABEL[p.age_group] : '';
  document.getElementById('profileView').style.display = 'block';
  document.getElementById('profileForm').style.display = 'none';
}

function showEditForm(){
  const p = currentProfile || {};
  document.getElementById('pName').value = p.full_name || currentUser.email;
  document.getElementById('pEmail').value = currentUser.email;
  document.getElementById('pPhone').value = p.phone || '';
  document.getElementById('pPersonalEmail').value = p.personal_email || '';
  document.getElementById('pBio').value = p.bio || '';
  document.getElementById('pWebsite').value = p.company_website || '';
  document.getElementById('pAgeGroup').value = p.age_group || '18-24';
  document.getElementById('profileView').style.display = 'none';
  document.getElementById('profileForm').style.display = 'block';
  document.getElementById('profileMsg').style.display = 'none';
}

document.getElementById('editBtn').onclick = showEditForm;
document.getElementById('cancelBtn').onclick = renderView;

document.getElementById('profileForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const msg = document.getElementById('profileMsg');
  msg.style.display = 'block'; msg.className = 'form-msg'; msg.textContent = '...';
  const updated = {
    full_name: document.getElementById('pName').value,
    phone: document.getElementById('pPhone').value,
    personal_email: document.getElementById('pPersonalEmail').value,
    bio: document.getElementById('pBio').value,
    company_website: document.getElementById('pWebsite').value,
    age_group: document.getElementById('pAgeGroup').value
  };
  const { error } = await sb.from('profiles').update(updated).eq('id', currentUser.id);
  if(error){ msg.className = 'form-msg err'; msg.textContent = error.message; return; }
  currentProfile = { ...currentProfile, ...updated };
  renderView();
});

init();
</script>
</body>
</html>
