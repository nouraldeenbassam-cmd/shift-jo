<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شفت — Shift</title>
<link rel="icon" type="image/svg+xml" href="shift-logo.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#FAFAF8; --card:#FFFFFF; --border:#E5E3DC; --border-strong:#D3D1C7;
    --text:#2C2C2A; --text-dim:#726F66; --blue:#378ADD; --blue-dark:#0C447C;
    --green:#639922; --green-dark:#27500A; --coral:#D85A30;
    --sans:'Tajawal', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); }
  .wrap{ max-width:1040px; margin:0 auto; padding:0 22px 90px; }

  header{ padding:36px 0 30px; border-bottom:1px solid var(--border); }
  .brand{ display:flex; align-items:center; gap:8px; text-decoration:none; }
  .brand .mark{ width:28px; height:28px; border-radius:8px; background:var(--blue); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px; }
  .brand .name{ font-weight:900; font-size:17px; letter-spacing:-0.01em; }
  .brand .name span{ color:var(--blue); }

  .topbar{ position:sticky; top:0; z-index:50; background:var(--card); border-bottom:1px solid var(--border); }
  .topbar-inner{ max-width:1040px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; justify-content:space-between; }
  .topbar-icons{ display:flex; align-items:center; gap:8px; }
  .icon-btn{ position:relative; background:none; border:1px solid var(--border-strong); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .bell-count{ display:none; position:absolute; top:-6px; left:-6px; background:var(--coral); color:#fff; font-size:10px; font-weight:700; border-radius:50%; width:16px; height:16px; align-items:center; justify-content:center; }
  .gear-wrap{ position:relative; }
  .gear-menu{ display:none; position:absolute; top:42px; left:0; background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.08); min-width:170px; overflow:hidden; z-index:60; }
  .gear-menu.open{ display:block; }
  .gear-menu a, .gear-menu button{ display:block; width:100%; text-align:right; padding:10px 14px; font-size:13px; color:var(--text); text-decoration:none; background:none; border:none; cursor:pointer; font-family:var(--sans); }
  .gear-menu a:hover, .gear-menu button:hover{ background:var(--bg); }
  .gear-menu button{ color:var(--coral); border-top:1px solid var(--border); }
  .login-link{ font-size:12.5px; color:var(--blue-dark); text-decoration:none; font-weight:600; }

  h1{ font-size:clamp(30px,5vw,46px); font-weight:900; line-height:1.2; margin-top:22px; letter-spacing:-0.01em; }
  h1 em{ font-style:normal; color:var(--green); }
  .lead{ color:var(--text-dim); font-size:15.5px; max-width:540px; margin-top:12px; line-height:1.75; }

  .stat-row{ display:flex; gap:0; margin-top:28px; flex-wrap:wrap; border:1px solid var(--border); border-radius:12px; overflow:hidden; width:fit-content; }
  .stat{ padding:14px 22px; border-left:1px solid var(--border); }
  .stat:last-child{ border-left:none; }
  .stat b{ display:block; font-size:22px; color:var(--blue-dark); font-weight:900; }
  .stat span{ font-size:11.5px; color:var(--text-dim); }

  .post-cta{
    display:inline-flex; align-items:center; gap:8px; margin-top:18px; background:var(--blue); color:#fff;
    padding:12px 20px; border-radius:10px; font-weight:700; font-size:14.5px; text-decoration:none;
  }
  .post-cta:hover{ background:var(--blue-dark); }
  .post-cta.outline{ background:var(--card); color:var(--blue-dark); border:1px solid var(--border-strong); }
  .post-cta.outline:hover{ background:var(--bg); }

  .board-head{ display:flex; justify-content:space-between; align-items:center; margin:32px 0 14px; flex-wrap:wrap; gap:10px; }
  .board-head h2{ font-size:17px; font-weight:700; }
  .board-filters{ display:flex; gap:8px; flex-wrap:wrap; }
  .board-filters select{
    background:var(--card); border:1px solid var(--border-strong); color:var(--text);
    padding:8px 10px; border-radius:8px; font-family:var(--sans); font-size:13px;
  }

  .job-list{ display:flex; flex-direction:column; gap:10px; }
  .job{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; transition:border-color .15s; }
  .job:hover{ border-color:var(--border-strong); }
  .top-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
  .job h3{ font-size:16px; font-weight:700; }
  .job h3 a{ color:inherit; text-decoration:none; }
  .job h3 a:hover{ text-decoration:underline; }
  .job .co{ font-size:12.5px; color:var(--text-dim); margin-top:3px; }
  .save-btn{ background:none; border:1px solid var(--border-strong); border-radius:8px; width:34px; height:34px; font-size:16px; cursor:pointer; flex-shrink:0; }
  .save-btn.saved{ background:rgba(216,90,48,0.1); border-color:var(--coral); }
  .badges{ display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .badge{ font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; }
  .badge.dur{ background:rgba(55,138,221,0.1); color:var(--blue-dark); }
  .badge.cat{ background:rgba(99,153,34,0.1); color:var(--green-dark); }
  .badge.urgent{ background:rgba(216,90,48,0.1); color:var(--coral); }
  .badge.skilled{ background:#F1EFE8; color:var(--text-dim); }
  .job .desc{ color:var(--text-dim); font-size:13.5px; margin-top:10px; line-height:1.6; }
  .job .bottom-row{ display:flex; justify-content:space-between; align-items:center; margin-top:12px; flex-wrap:wrap; gap:10px; }
  .job .wage{ font-weight:700; color:var(--text); font-size:14px; }
  .job .apply{
    background:var(--green); color:#fff; padding:7px 16px; border-radius:8px;
    font-size:12.5px; text-decoration:none; font-weight:600; border:none; cursor:pointer;
  }
  .job .apply:hover{ background:var(--green-dark); }

  .empty{ text-align:center; padding:50px 20px; color:var(--text-dim); font-size:13px; border:1px dashed var(--border-strong); border-radius:12px; }

  footer{ margin-top:60px; padding-top:20px; border-top:1px solid var(--border); color:var(--text-dim); font-size:12.5px; text-align:center; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand"><img src="shift-logo.svg" alt="Shift" style="width:28px;height:28px;border-radius:8px;display:block;"><div class="name">شفت <span>/ Shift</span></div></a>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="langBtn" class="icon-btn" style="width:auto; padding:0 10px; font-size:12px; font-weight:700;">AR</button>
      <div class="topbar-icons" id="topbarIcons"></div>
    </div>
  </div>
</div>
<div class="wrap">
  <header>
    <h1 style="margin-top:22px;" data-i18n="hero_title">Short-term shifts, anywhere</h1>
    <p class="lead" data-i18n="hero_lead">From day labor to specialist tasks — post a request or find a shift that fits.</p>

    <div class="stat-row">
      <div class="stat"><b id="statJobs">0</b><span data-i18n="stat_jobs">jobs available</span></div>
      <div class="stat"><b id="statCities">0</b><span data-i18n="stat_cities">cities</span></div>
      <div class="stat"><b id="statCats">0</b><span data-i18n="stat_cats">fields</span></div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <a href="post.html" class="post-cta" data-i18n="post_cta">+ Post a job listing</a>
      <a href="saved.html" class="post-cta outline" data-i18n="saved_jobs_link">❤️ Saved jobs</a>
    </div>
  </header>

  <div class="board-head" style="flex-direction:column; align-items:stretch;">
    <h2 data-i18n="board_title" style="margin-bottom:12px;">Available shifts</h2>
    <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="Search by job title..." style="width:100%; padding:11px 14px; border:1px solid var(--border-strong); border-radius:10px; font-family:var(--sans); font-size:14px; margin-bottom:12px; background:var(--card);">
    <div class="board-filters">
      <select id="filterCategory"><option value="" data-i18n="filter_all_cats">All fields</option></select>
      <select id="filterCity"><option value="" data-i18n="filter_all_cities">All cities</option></select>
      <select id="filterDuration"><option value="" data-i18n="filter_all_durations">All durations</option></select>
    </div>
  </div>
  <div class="job-list" id="jobList"></div>

  <footer data-i18n="footer_text">Shift — temporary staffing platform</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mkmynymssnvcinbdiqmr.supabase.co";
const SUPABASE_KEY = "sb_publishable_48UUMnF_UL_FPQkPeR0hOQ_rrtd7k33";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== i18n =====
const CAT_KEY = { 'عمالة يدوية':'cat_manual', 'تقنية / IT':'cat_it', 'إداري / مكتبي':'cat_admin', 'ضيافة / مطاعم':'cat_hospitality', 'تعليم / تدريب':'cat_edu', 'تصميم / محتوى':'cat_design', 'أخرى':'cat_other' };
const CITY_KEY = { 'عمّان':'city_amman', 'إربد':'city_irbid', 'البلقاء':'city_balqa', 'جرش':'city_jerash', 'الزرقاء':'city_zarqa', 'الطفيلة':'city_tafilah', 'عجلون':'city_ajloun', 'العقبة':'city_aqaba', 'الكرك':'city_karak', 'مادبا':'city_madaba', 'المفرق':'city_mafraq', 'معان':'city_maan' };
function tCat(v, t){ return t[CAT_KEY[v]] || v; }
function tCity(v, t){ return t[CITY_KEY[v]] || v; }
function tUnit(v, t){ return v === 'ساعات' ? t.unit_hours : t.unit_days; }
function formatWage(j, t){
  if(!j.wage || Number(j.wage) <= 0) return '—';
  return j.wage_type === 'total'
    ? `${j.wage} ${t.currency} ${t.wage_total_suffix}`
    : `${j.wage} ${t.currency}${t.per_day}`;
}

const I18N = {
  en: {
    hero_title: "Short-term shifts, anywhere",
    hero_lead: "From day labor to specialist tasks — post a request or find a shift that fits.",
    stat_jobs: "jobs available", stat_cities: "cities", stat_cats: "fields",
    post_cta: "+ Post a job listing", saved_jobs_link: "❤️ Saved jobs", board_title: "Available shifts",
    search_placeholder: "Search by job title...",
    filter_all_cats: "All fields", filter_all_cities: "All cities", filter_all_durations: "All durations",
    footer_text: "Shift — temporary staffing platform",
    call_now: "Call now", login_to_view: "Log in to view number", no_results: "No matching shifts — try different filters",
    login_link: "Log in", gear_profile: "Profile", gear_settings: "Settings", gear_logout: "Log out",
    bell_title: "Notifications", account_title: "Account",
    no_notifs: "No new notifications", renew_prompt: "posted {days} days ago — still open?",
    cat_manual: "Manual labor", cat_it: "Tech / IT", cat_admin: "Admin / Office", cat_hospitality: "Hospitality / Restaurants",
    cat_edu: "Education / Training", cat_design: "Design / Content", cat_other: "Other",
    unit_hours: "hours", unit_days: "days",
    city_amman: "Amman", city_irbid: "Irbid", city_balqa: "Balqa", city_jerash: "Jerash", city_zarqa: "Zarqa",
    city_tafilah: "Tafilah", city_ajloun: "Ajloun", city_aqaba: "Aqaba", city_karak: "Karak", city_madaba: "Madaba",
    city_mafraq: "Mafraq", city_maan: "Ma'an",
    badge_urgent: "Urgent", badge_skilled: "Requires certification",
    bucket_1_3: "1-3 days", bucket_4_7: "4-7 days", bucket_8_14: "8-14 days", bucket_15_30: "15-30 days",
    currency: "JOD", per_day: "/day", wage_total_suffix: "total"
  },
  ar: {
    hero_title: "شواغر قصيرة المدة، بكل مكان",
    hero_lead: "من عمالة يومية لمهام تخصصية — انشر طلبك أو دوّر شغلة تناسبك.",
    stat_jobs: "وظيفة متاحة", stat_cities: "مدينة", stat_cats: "مجال",
    post_cta: "+ انشر إعلان عن وظيفة", saved_jobs_link: "❤️ الوظائف المحفوظة", board_title: "الشواغر المتاحة",
    search_placeholder: "دوّر باسم الوظيفة...",
    filter_all_cats: "كل المجالات", filter_all_cities: "كل المدن", filter_all_durations: "كل المدد",
    footer_text: "شفت / Shift — منصة الشغل المؤقت",
    call_now: "اتصل الآن", login_to_view: "سجل دخول لعرض الرقم", no_results: "ما فيه شواغر مطابقة — جرب تغيّر الفلتر",
    login_link: "تسجيل دخول", gear_profile: "الصفحة الشخصية", gear_settings: "الإعدادات", gear_logout: "تسجيل خروج",
    bell_title: "الإشعارات", account_title: "الحساب",
    no_notifs: "ما فيه إشعارات جديدة", renew_prompt: "مرق عليها {days} أيام — لسا متاحة؟",
    cat_manual: "عمالة يدوية", cat_it: "تقنية / IT", cat_admin: "إداري / مكتبي", cat_hospitality: "ضيافة / مطاعم",
    cat_edu: "تعليم / تدريب", cat_design: "تصميم / محتوى", cat_other: "أخرى",
    unit_hours: "ساعات", unit_days: "أيام",
    city_amman: "عمّان", city_irbid: "إربد", city_balqa: "البلقاء", city_jerash: "جرش", city_zarqa: "الزرقاء",
    city_tafilah: "الطفيلة", city_ajloun: "عجلون", city_aqaba: "العقبة", city_karak: "الكرك", city_madaba: "مادبا",
    city_mafraq: "المفرق", city_maan: "معان",
    badge_urgent: "عاجل", badge_skilled: "يتطلب شهادة",
    bucket_1_3: "1-3 أيام", bucket_4_7: "4-7 أيام", bucket_8_14: "8-14 يوم", bucket_15_30: "15-30 يوم",
    currency: "دينار", per_day: "/يوم", wage_total_suffix: "إجمالي"
  }
};

function getLang(){ return localStorage.getItem('shift_lang') || 'en'; }

function applyLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if(I18N[lang][key]) el.placeholder = I18N[lang][key];
  });
  const btn = document.getElementById('langBtn');
  if(btn) btn.textContent = lang === 'ar' ? 'EN' : 'AR';
  render();
}

async function setLang(lang){
  localStorage.setItem('shift_lang', lang);
  if(currentUser){
    await sb.from('profiles').update({ lang }).eq('id', currentUser.id);
  }
  applyLang(lang);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('langBtn').onclick = () => setLang(getLang() === 'ar' ? 'en' : 'ar');
});


function bucketFor(days, unit){
  const d = unit === 'ساعات' ? Number(days) / 24 : Number(days);
  if(d <= 3) return '1-3 أيام';
  if(d <= 7) return '4-7 أيام';
  if(d <= 14) return '8-14 يوم';
  return '15-30 يوم';
}

function daysSince(dateStr){
  return (Date.now() - new Date(dateStr).getTime()) / (1000*60*60*24);
}

async function renderTopbar(user){
  const box = document.getElementById('topbarIcons');
  const t = I18N[getLang()];
  if(!user){
    box.innerHTML = `<a href="post.html" class="login-link">${t.login_link}</a>`;
    return;
  }
  const { data: myJobs } = await sb.from('jobs').select('id, title, renewed_at, created_at').eq('company_id', user.id);
  const stale = (myJobs || []).filter(j => daysSince(j.renewed_at || j.created_at) >= 7);
  const notifHtml = stale.length === 0
    ? `<div style="padding:14px; font-size:12.5px; color:var(--text-dim);">${t.no_notifs}</div>`
    : stale.map(j => `<a href="notifications.html" dir="auto">${j.title} — ${t.renew_prompt.replace('{days}', Math.floor(daysSince(j.renewed_at || j.created_at)))}</a>`).join('');

  box.innerHTML = `
    <div class="gear-wrap">
      <button id="bellBtn" class="icon-btn" title="${t.bell_title}">🔔<span id="bellCount" class="bell-count">${stale.length}</span></button>
      <div id="notifMenu" class="gear-menu" style="min-width:240px;">${notifHtml}</div>
    </div>
    <div class="gear-wrap">
      <button id="gearBtn" class="icon-btn" title="${t.account_title}">⚙️</button>
      <div id="gearMenu" class="gear-menu">
        <a href="profile.html">${t.gear_profile}</a>
        <a href="settings.html">${t.gear_settings}</a>
        <button id="logoutBtn">${t.gear_logout}</button>
      </div>
    </div>
  `;
  document.getElementById('bellCount').style.display = stale.length > 0 ? 'flex' : 'none';
  const bellBtn = document.getElementById('bellBtn');
  const notifMenu = document.getElementById('notifMenu');
  const gearBtn = document.getElementById('gearBtn');
  const gearMenu = document.getElementById('gearMenu');
  bellBtn.onclick = (e) => { e.stopPropagation(); notifMenu.classList.toggle('open'); gearMenu.classList.remove('open'); };
  gearBtn.onclick = (e) => { e.stopPropagation(); gearMenu.classList.toggle('open'); notifMenu.classList.remove('open'); };
  document.addEventListener('click', () => { gearMenu.classList.remove('open'); notifMenu.classList.remove('open'); });
  document.getElementById('logoutBtn').onclick = async () => {
    await sb.auth.signOut();
    window.location.reload();
  };
}

let jobs = [];
let currentUser = null;
let savedIds = new Set();

const jobList = document.getElementById('jobList');
const searchInput = document.getElementById('searchInput');
const filterCity = document.getElementById('filterCity');
const filterDuration = document.getElementById('filterDuration');
const filterCategory = document.getElementById('filterCategory');
const statJobs = document.getElementById('statJobs');
const statCities = document.getElementById('statCities');
const statCats = document.getElementById('statCats');

function unique(arr){ return [...new Set(arr)]; }

function populateFilters(){
  const t = I18N[getLang()];
  filterCity.innerHTML = `<option value="">${t.filter_all_cities}</option>` + unique(jobs.map(j=>j.city)).map(c=>`<option value="${c}">${tCity(c, t)}</option>`).join('');
  filterDuration.innerHTML = `<option value="">${t.filter_all_durations}</option>` + [['1-3 أيام',t.bucket_1_3],['4-7 أيام',t.bucket_4_7],['8-14 يوم',t.bucket_8_14],['15-30 يوم',t.bucket_15_30]].map(([v,label])=>`<option value="${v}">${label}</option>`).join('');
  filterCategory.innerHTML = `<option value="">${t.filter_all_cats}</option>` + unique(jobs.map(j=>j.category)).map(c=>`<option value="${c}">${tCat(c, t)}</option>`).join('');
}

function render(){
  const lang = getLang();
  const t = I18N[lang];
  const q = searchInput.value.trim().toLowerCase();
  const city = filterCity.value, dur = filterDuration.value, cat = filterCategory.value;
  const filtered = jobs.filter(j =>
    (!q || (j.title || '').toLowerCase().includes(q)) &&
    (!city || j.city===city) && (!dur || bucketFor(j.duration, j.duration_unit)===dur) && (!cat || j.category===cat)
  );

  statJobs.textContent = jobs.length;
  statCities.textContent = unique(jobs.map(j=>j.city)).length;
  statCats.textContent = unique(jobs.map(j=>j.category)).length;

  if(filtered.length===0){
    jobList.innerHTML = `<div class="empty">${t.no_results}</div>`;
    return;
  }

  const contactHtml = currentUser
    ? (j) => `<a href="tel:${j.phone}" class="apply" data-jobid="${j.id}">${t.call_now}</a>`
    : (j) => `<a href="job.html?id=${j.id}" class="apply">${t.login_to_view}</a>`;

  jobList.innerHTML = filtered.map(j => `
    <div class="job">
      <div class="top-row">
        <div>
          <h3 dir="auto"><a href="job.html?id=${j.id}">${j.title}</a></h3>
          <div class="co" dir="auto">${j.company_name || ''}</div>
          <div class="badges">
            <span class="badge dur">${j.duration} ${tUnit(j.duration_unit || 'أيام', t)}</span>
            <span class="badge cat">${tCat(j.category, t)}</span>
            ${j.urgent ? `<span class="badge urgent">${t.badge_urgent}</span>` : ''}
            ${j.skilled ? `<span class="badge skilled">${t.badge_skilled}</span>` : ''}
          </div>
        </div>
        <button class="save-btn ${savedIds.has(j.id) ? 'saved' : ''}" data-savejob="${j.id}" title="save">${savedIds.has(j.id) ? '❤️' : '🤍'}</button>
      </div>
      <div class="desc" dir="auto">${j.job_desc || ''}</div>
      <div class="bottom-row">
        <span class="wage" dir="auto">${formatWage(j, t)} · ${tCity(j.city, t)}</span>
        ${contactHtml(j)}
      </div>
    </div>
  `).join('');

  jobList.querySelectorAll('a[data-jobid]').forEach(link => {
    link.addEventListener('click', async () => {
      const id = link.dataset.jobid;
      const jobObj = jobs.find(x => x.id == id);
      await sb.from('jobs').update({ clicks: (jobObj.clicks || 0) + 1 }).eq('id', id);
    });
  });

  jobList.querySelectorAll('button[data-savejob]').forEach(btn => {
    btn.onclick = async () => {
      if(!currentUser){ window.location.href = 'post.html'; return; }
      const id = Number(btn.dataset.savejob);
      if(savedIds.has(id)){
        await sb.from('saved_jobs').delete().eq('user_id', currentUser.id).eq('job_id', id);
        savedIds.delete(id);
        btn.classList.remove('saved'); btn.textContent = '🤍';
      } else {
        await sb.from('saved_jobs').insert({ user_id: currentUser.id, job_id: id });
        savedIds.add(id);
        btn.classList.add('saved'); btn.textContent = '❤️';
      }
    };
  });
}

async function loadJobs(){
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session ? session.user : null;

  if(currentUser){
    const { data: profile } = await sb.from('profiles').select('lang').eq('id', currentUser.id).single();
    if(profile && profile.lang) localStorage.setItem('shift_lang', profile.lang);
    const { data: saved } = await sb.from('saved_jobs').select('job_id').eq('user_id', currentUser.id);
    savedIds = new Set((saved || []).map(r => r.job_id));
  }
  applyLang(getLang());
  await renderTopbar(currentUser);

  const { data, error } = await sb.from('jobs').select('*').order('created_at', { ascending: false });
  if(!error && data){
    jobs = data;
    populateFilters();
    render();
  }
}

[filterCity, filterDuration, filterCategory].forEach(el => el.addEventListener('change', render));
searchInput.addEventListener('input', render);

loadJobs();
</script>
</body>
</html>
