<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل الوظيفة — يومي / Yaumee</title>
<link rel="icon" type="image/svg+xml" href="shift-logo.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');
  :root{
    --bg:#FAFAF8; --card:#FFFFFF; --border:#E5E3DC; --border-strong:#D3D1C7;
    --text:#2C2C2A; --text-dim:#726F66; --blue:#378ADD; --blue-dark:#0C447C;
    --green:#639922; --green-dark:#27500A; --coral:#D85A30;
    --sans:'Tajawal', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); }
  .wrap{ max-width:640px; margin:0 auto; padding:0 22px 90px; }

  header{ padding:30px 0 22px; }
  .brand{ display:flex; align-items:center; gap:8px; text-decoration:none; }
  .brand .mark{ width:28px; height:28px; border-radius:8px; background:var(--blue); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px; }
  .brand .name{ font-weight:900; font-size:17px; letter-spacing:-0.01em; }
  .brand .name span{ color:var(--blue); }
  .back-link{ display:inline-block; margin-top:14px; font-size:12.5px; color:var(--text-dim); text-decoration:none; }
  .back-link:hover{ text-decoration:underline; }

  .topbar{ position:sticky; top:0; z-index:50; background:var(--card); border-bottom:1px solid var(--border); }
  .topbar-inner{ max-width:640px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; justify-content:space-between; }
  .topbar-icons{ display:flex; align-items:center; gap:8px; }
  .icon-btn{ position:relative; background:none; border:1px solid var(--border-strong); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px; color:var(--text); display:flex; align-items:center; justify-content:center; }
  .bell-count{ display:none; position:absolute; top:-6px; left:-6px; background:var(--coral); color:#fff; font-size:10px; font-weight:700; border-radius:50%; width:16px; height:16px; align-items:center; justify-content:center; }
  .gear-wrap{ position:relative; }
  .gear-menu{ display:none; position:absolute; top:42px; left:0; background:var(--card); border:1px solid var(--border); border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.08); min-width:170px; overflow:hidden; z-index:60; }
  .gear-menu.open{ display:block; }
  .gear-menu a, .gear-menu button{ display:block; width:100%; text-align:right; padding:10px 14px; font-size:13px; color:var(--text); text-decoration:none; background:none; border:none; cursor:pointer; font-family:var(--sans); }
  .gear-menu a:hover, .gear-menu button:hover{ background:var(--bg); }
  .gear-menu button{ color:var(--coral); border-top:1px solid var(--border); }
  .login-link{ font-size:12.5px; color:var(--blue-dark); text-decoration:none; font-weight:600; }

  .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:26px; }
  .top-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  h1{ font-size:22px; font-weight:800; line-height:1.35; }
  .co{ font-size:13.5px; color:var(--text-dim); margin-top:6px; }
  .save-btn{ background:none; border:1px solid var(--border-strong); border-radius:10px; width:40px; height:40px; font-size:18px; cursor:pointer; flex-shrink:0; }
  .save-btn.saved{ background:rgba(216,90,48,0.1); border-color:var(--coral); }

  .badges{ display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; }
  .badge{ font-size:11.5px; padding:4px 12px; border-radius:20px; font-weight:500; }
  .badge.dur{ background:rgba(55,138,221,0.1); color:var(--blue-dark); }
  .badge.cat{ background:rgba(99,153,34,0.1); color:var(--green-dark); }
  .badge.urgent{ background:rgba(216,90,48,0.1); color:var(--coral); }
  .badge.skilled{ background:#F1EFE8; color:var(--text-dim); }

  .wage{ font-size:19px; font-weight:800; margin-top:18px; }
  .city{ font-size:13.5px; color:var(--text-dim); margin-top:4px; }

  .desc{ margin-top:20px; padding-top:20px; border-top:1px solid var(--border); font-size:14.5px; line-height:1.8; color:var(--text); }
  .desc-empty{ color:var(--text-dim); font-style:normal; }

  .contact-box{ margin-top:22px; padding-top:22px; border-top:1px solid var(--border); }
  .contact-locked{ text-align:center; padding:20px; background:var(--bg); border-radius:10px; }
  .contact-locked p{ font-size:13.5px; color:var(--text-dim); margin-bottom:14px; }
  .btn{ display:inline-block; background:var(--blue); color:#fff; border:none; padding:12px 24px; font-weight:700; font-size:14.5px; border-radius:8px; cursor:pointer; text-decoration:none; }
  .btn:hover{ background:var(--blue-dark); }
  .btn.call{ background:var(--green); width:100%; text-align:center; }
  .btn.call:hover{ background:var(--green-dark); }

  .loading{ text-align:center; padding:60px 20px; color:var(--text-dim); font-size:13px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand"><img src="shift-logo.svg" alt="Yaumee" style="width:28px;height:28px;border-radius:8px;display:block;"><div class="name">يومي <span>/ Yaumee</span></div></a>
    <div style="display:flex; align-items:center; gap:8px;">
      <button id="langBtn" class="icon-btn" style="width:auto; padding:0 10px; font-size:12px; font-weight:700;">AR</button>
      <div class="topbar-icons" id="topbarIcons"></div>
    </div>
  </div>
</div>
<div class="wrap">
  <header>
    <a href="index.html" class="back-link" data-i18n="back_link">← Back to all jobs</a>
  </header>

  <div id="loading" class="loading" data-i18n="loading_text">Loading...</div>
  <div class="card" id="jobCard" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mkmynymssnvcinbdiqmr.supabase.co";
const SUPABASE_KEY = "sb_publishable_48UUMnF_UL_FPQkPeR0hOQ_rrtd7k33";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const CAT_KEY = { 'عمالة يدوية':'cat_manual', 'تقنية / IT':'cat_it', 'إداري / مكتبي':'cat_admin', 'ضيافة / مطاعم':'cat_hospitality', 'تعليم / تدريب':'cat_edu', 'تصميم / محتوى':'cat_design', 'أخرى':'cat_other' };
const CITY_KEY = { 'عمّان':'city_amman', 'إربد':'city_irbid', 'البلقاء':'city_balqa', 'جرش':'city_jerash', 'الزرقاء':'city_zarqa', 'الطفيلة':'city_tafilah', 'عجلون':'city_ajloun', 'العقبة':'city_aqaba', 'الكرك':'city_karak', 'مادبا':'city_madaba', 'المفرق':'city_mafraq', 'معان':'city_maan' };
function tCat(v, t){ return t[CAT_KEY[v]] || v; }
function tCity(v, t){ return t[CITY_KEY[v]] || v; }
function tUnit(v, t){ return v === 'ساعات' ? t.unit_hours : t.unit_days; }
function formatWage(j, t){
  if(!j.wage || Number(j.wage) <= 0) return '—';
  return j.wage_type === 'total'
    ? `${j.wage} ${t.currency} ${t.wage_total_suffix}`
    : `${j.wage} ${t.currency}${t.per_day}`;
}

const I18N = {
  en: {
    back_link: "← Back to all jobs", loading_text: "Loading...",
    not_found: "This job isn't available anymore (it may have been deleted or expired).",
    no_link: "No valid job link.",
    call_now: "Call now —", login_prompt: "Log in to see the contact number and call the company.",
    login_link: "Log in / Sign up", desc_empty: "No additional details.",
    workers_needed: "worker(s) needed",
    gear_profile: "Profile", gear_settings: "Settings", gear_logout: "Log out", bell_title: "Notifications", account_title: "Account",
    no_notifs: "No new notifications", renew_prompt: "posted {days} days ago — still open?",
    cat_manual: "Manual labor", cat_it: "Tech / IT", cat_admin: "Admin / Office", cat_hospitality: "Hospitality / Restaurants",
    cat_edu: "Education / Training", cat_design: "Design / Content", cat_other: "Other",
    unit_hours: "hours", unit_days: "days",
    city_amman: "Amman", city_irbid: "Irbid", city_balqa: "Balqa", city_jerash: "Jerash", city_zarqa: "Zarqa",
    city_tafilah: "Tafilah", city_ajloun: "Ajloun", city_aqaba: "Aqaba", city_karak: "Karak", city_madaba: "Madaba",
    city_mafraq: "Mafraq", city_maan: "Ma'an",
    badge_urgent: "Urgent", badge_skilled: "Requires certification", currency: "JOD", per_day: "/day", wage_total_suffix: "total",
    applicants: "apply"
  },
  ar: {
    back_link: "← رجوع لكل الشواغر", loading_text: "جاري التحميل...",
    not_found: "هاي الوظيفة مش موجودة (يمكن انحذفت أو خلصت مدتها).",
    no_link: "ما فيه رابط وظيفة صحيح.",
    call_now: "اتصل الآن —", login_prompt: "لازم تسجل دخول حتى تقدر تشوف رقم التواصل وتتصلي بالشركة.",
    login_link: "تسجيل دخول / حساب جديد", desc_empty: "ما فيه تفاصيل إضافية.",
    workers_needed: "عامل مطلوب",
    gear_profile: "الصفحة الشخصية", gear_settings: "الإعدادات", gear_logout: "تسجيل خروج", bell_title: "الإشعارات", account_title: "الحساب",
    no_notifs: "ما فيه إشعارات جديدة", renew_prompt: "مرق عليها {days} أيام — لسا متاحة؟",
    cat_manual: "عمالة يدوية", cat_it: "تقنية / IT", cat_admin: "إداري / مكتبي", cat_hospitality: "ضيافة / مطاعم",
    cat_edu: "تعليم / تدريب", cat_design: "تصميم / محتوى", cat_other: "أخرى",
    unit_hours: "ساعات", unit_days: "أيام",
    city_amman: "عمّان", city_irbid: "إربد", city_balqa: "البلقاء", city_jerash: "جرش", city_zarqa: "الزرقاء",
    city_tafilah: "الطفيلة", city_ajloun: "عجلون", city_aqaba: "العقبة", city_karak: "الكرك", city_madaba: "مادبا",
    city_mafraq: "المفرق", city_maan: "معان",
    badge_urgent: "عاجل", badge_skilled: "يتطلب شهادة", currency: "دينار", per_day: "/يوم", wage_total_suffix: "إجمالي",
    applicants: "شخص ضغط على الرقم"
  }
};

function getLang(){ return localStorage.getItem('shift_lang') || 'en'; }

function applyLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  const btn = document.getElementById('langBtn');
  if(btn) btn.textContent = lang === 'ar' ? 'EN' : 'AR';
  if(job) render();
}

async function setLang(lang){
  localStorage.setItem('shift_lang', lang);
  if(currentUser){
    await sb.from('profiles').update({ lang }).eq('id', currentUser.id);
  }
  applyLang(lang);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('langBtn').onclick = () => setLang(getLang() === 'ar' ? 'en' : 'ar');
});

const params = new URLSearchParams(window.location.search);
const jobId = params.get('id');

let currentUser = null;
let job = null;
let isSaved = false;

function daysSince(dateStr){
  return (Date.now() - new Date(dateStr).getTime()) / (1000*60*60*24);
}

async function renderTopbar(user){
  const box = document.getElementById('topbarIcons');
  const t = I18N[getLang()];
  if(!user){
    box.innerHTML = `<a href="post.html" class="login-link">${t.login_link}</a>`;
    return;
  }
  const { data: myJobs } = await sb.from('jobs').select('id, title, renewed_at, created_at').eq('company_id', user.id);
  const stale = (myJobs || []).filter(j => daysSince(j.renewed_at || j.created_at) >= 7);
  const notifHtml = stale.length === 0
    ? `<div style="padding:14px; font-size:12.5px; color:var(--text-dim);">${t.no_notifs}</div>`
    : stale.map(j => `<a href="notifications.html" dir="auto">${escapeHtml(j.title)} — ${t.renew_prompt.replace('{days}', Math.floor(daysSince(j.renewed_at || j.created_at)))}</a>`).join('');

  box.innerHTML = `
    <div class="gear-wrap">
      <button id="bellBtn" class="icon-btn" title="${t.bell_title}">🔔<span id="bellCount" class="bell-count">${stale.length}</span></button>
      <div id="notifMenu" class="gear-menu" style="min-width:240px;">${notifHtml}</div>
    </div>
    <div class="gear-wrap">
      <button id="gearBtn" class="icon-btn" title="${t.account_title}">⚙️</button>
      <div id="gearMenu" class="gear-menu">
        <a href="profile.html">${t.gear_profile}</a>
        <a href="settings.html">${t.gear_settings}</a>
        <button id="logoutBtn">${t.gear_logout}</button>
      </div>
    </div>
  `;
  document.getElementById('bellCount').style.display = stale.length > 0 ? 'flex' : 'none';
  const bellBtn = document.getElementById('bellBtn');
  const notifMenu = document.getElementById('notifMenu');
  const gearBtn = document.getElementById('gearBtn');
  const gearMenu = document.getElementById('gearMenu');
  bellBtn.onclick = (e) => { e.stopPropagation(); notifMenu.classList.toggle('open'); gearMenu.classList.remove('open'); };
  gearBtn.onclick = (e) => { e.stopPropagation(); gearMenu.classList.toggle('open'); notifMenu.classList.remove('open'); };
  document.addEventListener('click', () => { gearMenu.classList.remove('open'); notifMenu.classList.remove('open'); });
  document.getElementById('logoutBtn').onclick = async () => {
    await sb.auth.signOut();
    window.location.reload();
  };
}

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session ? session.user : null;
  document.getElementById('langBtn').style.display = currentUser ? 'none' : '';

  if(currentUser){
    const { data: profile } = await sb.from('profiles').select('lang').eq('id', currentUser.id).single();
    if(profile && profile.lang) localStorage.setItem('shift_lang', profile.lang);
  }
  applyLang(getLang());
  await renderTopbar(currentUser);

  if(!jobId){
    document.getElementById('loading').textContent = I18N[getLang()].no_link;
    return;
  }

  const { data, error } = await sb.from('jobs').select('*').eq('id', jobId).single();
  if(error || !data){
    document.getElementById('loading').textContent = I18N[getLang()].not_found;
    return;
  }
  job = data;

  if(currentUser){
    const { data: saved } = await sb.from('saved_jobs').select('*').eq('user_id', currentUser.id).eq('job_id', job.id).maybeSingle();
    isSaved = !!saved;
  }

  render();
}

function render(){
  const t = I18N[getLang()];
  document.getElementById('loading').style.display = 'none';
  const card = document.getElementById('jobCard');
  card.style.display = 'block';

  const contactHtml = currentUser ? `
    <div class="contact-box">
      <a href="tel:${job.phone}" class="btn call" id="callBtn">${t.call_now} ${job.phone}</a>
    </div>
  ` : `
    <div class="contact-box">
      <div class="contact-locked">
        <p>${t.login_prompt}</p>
        <a href="post.html" class="btn">${t.login_link}</a>
      </div>
    </div>
  `;

  card.innerHTML = `
    <div class="top-row">
      <div>
        <h1 dir="auto">${escapeHtml(job.title)}</h1>
        <a class="co" dir="auto" href="company.html?id=${job.company_id}" style="text-decoration:none;">${escapeHtml(job.company_name || '')}</a>
      </div>
      <button class="save-btn ${isSaved ? 'saved' : ''}" id="saveBtn">${isSaved ? '❤️' : '🤍'}</button>
    </div>
    <div class="badges">
      <span class="badge dur">${job.duration} ${tUnit(job.duration_unit || 'أيام', t)}</span>
      <span class="badge cat">${tCat(job.category, t)}</span>
      ${job.urgent ? `<span class="badge urgent">${t.badge_urgent}</span>` : ''}
      ${job.skilled ? `<span class="badge skilled">${t.badge_skilled}</span>` : ''}
    </div>
    <div class="wage" dir="auto">${formatWage(job, t)}</div>
    <div class="city" dir="auto">${tCity(job.city, t)} · ${job.count || 1} ${t.workers_needed}</div>
    <div class="city" dir="auto">${job.clicks || 0} ${t.applicants}</div>
    <div class="desc" dir="auto">${job.job_desc ? escapeHtml(job.job_desc) : `<span class="desc-empty">${t.desc_empty}</span>`}</div>
    ${contactHtml}
  `;

  document.getElementById('saveBtn').onclick = toggleSave;
  const callBtn = document.getElementById('callBtn');
  if(callBtn){
    callBtn.addEventListener('click', async () => {
      await sb.rpc('increment_job_clicks', { job_id: job.id });
    });
  }
}

async function toggleSave(){
  if(!currentUser){
    window.location.href = 'post.html';
    return;
  }
  if(isSaved){
    await sb.from('saved_jobs').delete().eq('user_id', currentUser.id).eq('job_id', job.id);
  } else {
    await sb.from('saved_jobs').insert({ user_id: currentUser.id, job_id: job.id });
  }
  isSaved = !isSaved;
  render();
}

init();
</script>
</body>
</html>
